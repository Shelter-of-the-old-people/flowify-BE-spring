spring:
  data:
    mongodb:
      uri: mongodb://localhost:27017/flowify

  security:
    oauth2:
      client:
        registration:
          google:
            redirect-uri: http://localhost:8080/api/auth/google/callback

app:
  auth:
    front-redirect-uri: http://localhost:5173/auth/callback

  jwt:
    secret: dev-jwt-secret-key-for-local-development-only-32chars!!
    access-expiration-ms: 1800000
    refresh-expiration-ms: 604800000

  encryption:
    secret-key: ZGV2LWVuY3J5cHRpb24tc2VjcmV0LWtleS0zMmNoYXJz

  fastapi:
    base-url: http://localhost:8000
    internal-token: dev-internal-api-secret

  cors:
    allowed-origins: http://localhost:3000,http://localhost:5173

server:
  port: 8080

logging:
  level:
    org.github.flowify: DEBUG
    org.springframework.security: DEBUG
