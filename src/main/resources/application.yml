spring:
  application:
    name: Flowify

  data:
    mongodb:
      uri: ${MONGODB_URL:mongodb://localhost:27017/flowify}

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope: openid, email, profile
            redirect-uri: ${GOOGLE_REDIRECT_URI}

app:
  auth:
    front-redirect-uri: ${FRONT_REDIRECT_URI}

  oauth:
    slack:
      client-id: ${SLACK_CLIENT_ID}
      client-secret: ${SLACK_CLIENT_SECRET}
      redirect-uri: ${SLACK_REDIRECT_URI}
      scopes: channels:read,chat:write,users:read
    google-drive:
      client-id: ${GOOGLE_CLIENT_ID}
      client-secret: ${GOOGLE_CLIENT_SECRET}
      redirect-uri: ${GOOGLE_DRIVE_REDIRECT_URI:http://localhost:8080/api/oauth-tokens/google_drive/callback}
      scopes: https://www.googleapis.com/auth/drive.readonly https://www.googleapis.com/auth/drive.file https://www.googleapis.com/auth/spreadsheets
    gmail:
      client-id: ${GMAIL_CLIENT_ID:${GOOGLE_CLIENT_ID}}
      client-secret: ${GMAIL_CLIENT_SECRET:${GOOGLE_CLIENT_SECRET}}
      redirect-uri: ${GMAIL_REDIRECT_URI:http://localhost:8080/api/oauth-tokens/gmail/callback}
      scopes: https://www.googleapis.com/auth/gmail.readonly https://www.googleapis.com/auth/gmail.send
    notion:
      token: ${NOTION_INTEGRATION_TOKEN}
    github:
      token: ${GITHUB_TOKEN}
    canvas-lms:
      api-url: ${CANVAS_API_URL:https://canvas.kumoh.ac.kr}
      token: ${CANVAS_TOKEN:}

  jwt:
    secret: ${JWT_SECRET}
    access-expiration-ms: 1800000
    refresh-expiration-ms: 604800000

  encryption:
    secret-key: ${ENCRYPTION_SECRET_KEY}

  fastapi:
    base-url: ${FASTAPI_URL:http://localhost:8000}
    internal-token: ${INTERNAL_API_SECRET}

  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}

server:
  port: ${SERVER_PORT:8080}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: method
  api-docs:
    path: /v3/api-docs
  default-consumes-media-type: application/json
  default-produces-media-type: application/json
